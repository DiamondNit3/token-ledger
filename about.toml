accepted = [
    "Apache-2.0",
    "MIT",
    "Unicode-3.0",
    "ISC",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Zlib",
]

targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

ignore-dev-dependencies = true
workarounds = ["chrono", "rustls"]
private = { ignore = true }

# ring 0.17.14 split its license files and retains distinct BoringSSL-derived
# ISC headers in source files. The built-in cargo-about workaround targets an
# older monolithic layout, so this version is clarified explicitly.
