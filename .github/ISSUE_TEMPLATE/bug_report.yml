name: Bug report
description: Report incorrect behavior using sanitized, synthetic evidence.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Do not attach real session logs, databases, configs, receipts, credentials, raw IDs, or user paths. Use a minimal synthetic reproduction.

  - type: input
    id: version
    attributes:
      label: Token Ledger version
      placeholder: "token-ledger 0.4.0"
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: "Windows 11, Ubuntu 26.04, macOS 16"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Affected source
      options:
        - Claude Code
        - OpenAI Codex
        - Price catalog
        - Reconciliation import
        - Terminal or export rendering
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Sanitized command
      description: Remove local paths and identifiers.
      render: shell
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
      description: Include only fictional data needed to reproduce the issue.

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Prefer warning codes and `--plain` output after reviewing it.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed real transcripts, paths, identifiers, credentials, configs, databases, receipts, and account data.
          required: true
